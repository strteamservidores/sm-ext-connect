name: Extension builder (Ultra Compatible)

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04

    name: Linux Build (Docker Ultra Compat)

    env:
      PROJECT: 'connect'
      SDKS: 'csgo css hl2dm dods tf2'
      MMSOURCE_VERSION: '1.12'
      SOURCEMOD_VERSION: '1.12'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: extension

      # 🔥 BUILD DENTRO DO UBUNTU 18.04 (SEM QUEBRAR ACTIONS)
      - name: Build inside Ubuntu 18.04 container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ubuntu:18.04 \
            bash -c "

            apt-get update && apt-get install -y \
              gcc g++ \
              gcc-multilib g++-multilib \
              libc6-dev libc6-dev-i386 \
              libstdc++6 lib32stdc++6 \
              lib32z1-dev zlib1g-dev \
              python3 python3-pip \
              git make

            cd extension

            mkdir -p cache
            cd cache

            shallow_checkout () {
                if [ ! -d \"\$3\" ]; then
                    git clone \"\$1\" --depth 1 --branch \"\$2\" \"\$3\"
                fi
                cd \"\$3\"
                git fetch --depth 1 origin \"\$2\"
                git checkout FETCH_HEAD
                git submodule update --init --depth 1
                cd ..
            }

            for sdk in csgo css hl2dm dods tf2
            do
                shallow_checkout https://github.com/alliedmodders/hl2sdk \$sdk hl2sdk-\$sdk
            done

            shallow_checkout https://github.com/alliedmodders/ambuild master ambuild
            shallow_checkout https://github.com/alliedmodders/sourcemod ${SOURCEMOD_VERSION}-dev sourcemod
            shallow_checkout https://github.com/alliedmodders/metamod-source ${MMSOURCE_VERSION}-dev metamod-source

            python3 -m pip install ./ambuild

            cd ../
            mkdir build && cd build

            export CC=gcc
            export CXX=g++
            export CFLAGS='-m32 -fPIC'
            export CXXFLAGS='-m32 -fPIC -static-libstdc++ -static-libgcc -Wno-error'
            export LDFLAGS='-m32'

            python3 ../configure.py \
              --enable-auto-versioning \
              --enable-optimize \
              --sdks='csgo css hl2dm dods tf2' \
              --mms-path='../cache/metamod-source' \
              --hl2sdk-root='../cache' \
              --sm-path='../cache/sourcemod'

            ambuild
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-ultra-compatible
          path: extension/build/package
