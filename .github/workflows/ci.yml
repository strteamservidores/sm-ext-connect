name: Extension builder

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2022]
        include:
          - os: ubuntu-22.04
            cc: clang
            cxx: clang++
          - os: windows-2022
            cc: msvc
      fail-fast: false

    name: ${{ matrix.os }} - ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}

    env:
      PROJECT: 'connect'
      SDKS: 'csgo css hl2dm dods tf2'
      MMSOURCE_VERSION: '1.12'
      SOURCEMOD_VERSION: '1.12'
      CACHE_PATH: ${{ github.workspace }}/cache

      # 🔥 ESSENCIAL PRA COMPATIBILIDADE
      CFLAGS: "-m32 -fPIC"
      CXXFLAGS: "-m32 -fPIC -static-libstdc++ -static-libgcc"
      LDFLAGS: "-m32"

    steps:
      - name: Concatenate SDK Names
        shell: bash
        run: |
          SDKS_VAR="${{env.SDKS}}"
          echo "SDKS_KEY=${SDKS_VAR//[[:blank:]]/}" >> $GITHUB_ENV

      # 🔥 DEPENDÊNCIAS OTIMIZADAS
      - name: Linux dependencies
        if: startsWith(runner.os, 'Linux')
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            gcc-multilib g++-multilib \
            libc6-dev libc6-dev-i386 \
            libstdc++6 lib32stdc++6 \
            lib32z1-dev zlib1g-dev \
            make git

      - uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: extension

      - uses: actions/cache@v4
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        with:
          path: ${{ env.CACHE_PATH }}
          key: ${{ runner.os }}-sm${{ env.SOURCEMOD_VERSION }}-${{ env.SDKS_KEY }}

      - name: Install dependencies
        shell: bash
        run: |
          mkdir -p "${{ env.CACHE_PATH }}"
          cd "${{ env.CACHE_PATH }}"

          shallow_checkout () {
              if [ ! -d "$3" ]; then
                  git clone "$1" --depth 1 --branch "$2" "$3"
              fi
              cd "$3"
              git fetch --depth 1 origin "$2"
              git checkout FETCH_HEAD
              git submodule update --init --depth 1
              cd ..
          }

          for sdk in ${{ env.SDKS }}
          do
              shallow_checkout "https://github.com/alliedmodders/hl2sdk" "${sdk}" "hl2sdk-${sdk}"
          done

          shallow_checkout "https://github.com/alliedmodders/ambuild" "master" "ambuild"
          shallow_checkout "https://github.com/alliedmodders/sourcemod" "${{env.SOURCEMOD_VERSION}}-dev" "sourcemod"
          shallow_checkout "https://github.com/alliedmodders/metamod-source/" "${{env.MMSOURCE_VERSION}}-dev" "metamod-source"

      - name: Setup AMBuild
        run: |
          cd "${{ env.CACHE_PATH }}"
          python -m pip install ./ambuild

      - name: Select compiler
        if: startsWith(runner.os, 'Linux')
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      # 🔥 BUILD COM COMPATIBILIDADE
      - name: Build
        shell: bash
        working-directory: extension
        run: |
          mkdir build && cd build

          python ../configure.py \
            --enable-auto-versioning \
            --enable-optimize \
            --sdks="${{ env.SDKS }}" \
            --mms-path="${{ env.CACHE_PATH }}/metamod-source" \
            --hl2sdk-root="${{ env.CACHE_PATH }}" \
            --sm-path="${{ env.CACHE_PATH }}/sourcemod"

          ambuild

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}
          path: extension/build/package
