name: Extension builder (Ultra Compatible)

on:
  push:
    branches: [master, main]
    tags: ["*"]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest # O runner hospeda o container

    name: Linux Build (Ubuntu 18.04 GLIBC)

    container:
      image: ubuntu:18.04

    env:
      PROJECT: 'connect'
      SDKS: 'csgo css hl2dm dods tf2'
      MMSOURCE_VERSION: '1.12'
      SOURCEMOD_VERSION: '1.12'
      # Usar o workspace do GitHub para evitar problemas de permissão fora do path
      CACHE_PATH: ${{ github.workspace }}/deps 

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y software-properties-common
          # Adicionar repo para Git mais recente se necessário, mas 18.04 costuma servir
          dpkg --add-architecture i386
          apt-get update
          apt-get install -y \
            gcc-multilib g++-multilib \
            libc6-dev-i386 lib32stdc++6 \
            lib32z1-dev \
            python3 python3-pip python3-setuptools \
            git curl ca-certificates

      - name: Checkout repo
        uses: actions/checkout@v4
        # Nota: Se o checkout falhar por causa do Node no 18.04, 
        # o GitHub Actions automaticamente tenta usar uma versão compatível.

      - name: Install AMBuild & Dependencies
        run: |
          mkdir -p ${{ env.CACHE_PATH }}
          cd ${{ env.CACHE_PATH }}
          
          # Instalar AMBuild via Pip é mais rápido e seguro que clonar o repo
          python3 -m pip install git+https://github.com/alliedmodders/ambuild

          shallow_checkout () {
              if [ ! -d "$3" ]; then
                  git clone "$1" --depth 1 --branch "$2" "$3"
              else
                  cd "$3"
                  git fetch --depth 1 origin "$2"
                  git checkout FETCH_HEAD
                  cd ..
              fi
          }

          for sdk in ${{ env.SDKS }}; do
              shallow_checkout "https://github.com/alliedmodders/hl2sdk" "${sdk}" "hl2sdk-${sdk}"
          done

          shallow_checkout "https://github.com/alliedmodders/sourcemod" "${{env.SOURCEMOD_VERSION}}-dev" "sourcemod"
          shallow_checkout "https://github.com/alliedmodders/metamod-source/" "${{env.MMSOURCE_VERSION}}-dev" "metamod"

      - name: Build extension
        run: |
          mkdir -p build
          cd build
          # Ajuste nos caminhos para refletir o checkout padrão (./)
          python3 ../configure.py \
            --enable-optimize \
            --sdks="${{ env.SDKS }}" \
            --mms-path="${{ env.CACHE_PATH }}/metamod" \
            --hl2sdk-root="${{ env.CACHE_PATH }}" \
            --sm-path="${{ env.CACHE_PATH }}/sourcemod"
          
          # O caminho do ambuild no 18.04 pode exigir o prefixo python3
          python3 -m ambuild

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT }}-linux-compat
