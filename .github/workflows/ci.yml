```yaml
name: Extension builder (Ultra Compatible)

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04

    name: Linux Build (Ultra Compatible)

    container:
      image: ubuntu:18.04

    env:
      PROJECT: 'connect'
      SDKS: 'csgo css hl2dm dods tf2'
      MMSOURCE_VERSION: '1.12'
      SOURCEMOD_VERSION: '1.12'
      CACHE_PATH: /cache

      CC: gcc
      CXX: g++

      # 🔥 FLAGS COMPATÍVEIS COM SERVIDORES ANTIGOS
      CFLAGS: "-m32 -fPIC"
      CXXFLAGS: "-m32 -fPIC -static-libstdc++ -static-libgcc -Wno-error"
      LDFLAGS: "-m32"

    steps:
      - name: Install dependencies (Ubuntu 18.04)
        run: |
          dpkg --add-architecture i386
          apt-get update
          apt-get install -y \
            gcc g++ \
            gcc-multilib g++-multilib \
            libc6-dev libc6-dev-i386 \
            libstdc++6 lib32stdc++6 \
            lib32z1-dev zlib1g-dev \
            python3 python3-pip \
            git make curl

      - name: Setup Python
        run: |
          python3 -m pip install --upgrade pip setuptools wheel

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: extension

      - name: Prepare cache dir
        run: mkdir -p "${{ env.CACHE_PATH }}"

      - name: Install SourceMod dependencies
        run: |
          cd "${{ env.CACHE_PATH }}"

          shallow_checkout () {
              if [ ! -d "$3" ]; then
                  git clone "$1" --depth 1 --branch "$2" "$3"
              fi
              cd "$3"
              git fetch --depth 1 origin "$2"
              git checkout FETCH_HEAD
              git submodule update --init --depth 1
              cd ..
          }

          for sdk in ${{ env.SDKS }}
          do
              shallow_checkout "https://github.com/alliedmodders/hl2sdk" "${sdk}" "hl2sdk-${sdk}"
          done

          shallow_checkout "https://github.com/alliedmodders/ambuild" "master" "ambuild"
          shallow_checkout "https://github.com/alliedmodders/sourcemod" "${{env.SOURCEMOD_VERSION}}-dev" "sourcemod"
          shallow_checkout "https://github.com/alliedmodders/metamod-source/" "${{env.MMSOURCE_VERSION}}-dev" "metamod-source"

      - name: Setup AMBuild
        run: |
          cd "${{ env.CACHE_PATH }}"
          python3 -m pip install ./ambuild

      - name: Build extension
        working-directory: extension
        run: |
          mkdir build && cd build

          python3 ../configure.py \
            --enable-auto-versioning \
            --enable-optimize \
            --sdks="${{ env.SDKS }}" \
            --mms-path="${{ env.CACHE_PATH }}/metamod-source" \
            --hl2sdk-root="${{ env.CACHE_PATH }}" \
            --sm-path="${{ env.CACHE_PATH }}/sourcemod"

          ambuild

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-ultra-compatible
          path: extension/build/package
```
